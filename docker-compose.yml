version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: rcm_benchmarking_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rcm_benchmarking
      MYSQL_USER: rcm_user
      MYSQL_PASSWORD: rcm_password
    ports:
      - "3306:3306"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./seed_data.sql:/docker-entrypoint-initdb.d/2_seed.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
