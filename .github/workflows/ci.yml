name: Python CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: rcm_benchmarking
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create .env file
      run: |
        cp .env.example .env
    
    - name: Wait for MySQL
      run: |
        until mysql -h 127.0.0.1 -u root -proot -e "SELECT 1"; do
          sleep 1
        done
    
    - name: Load database schema
      run: |
        mysql -h 127.0.0.1 -u root -proot rcm_benchmarking < schema.sql
    
    - name: Load sample data
      run: |
        mysql -h 127.0.0.1 -u root -proot rcm_benchmarking < seed_data.sql
    
    - name: Validate Python syntax
      run: |
        python -m py_compile rcm_benchmarking.py
    
    - name: Run analysis
      run: |
        python rcm_benchmarking.py
    
    - name: Check CSV output exists
      run: |
        test -f kpi_scorecard.csv && echo "✅ Scorecard generated"
        test -f monthly_revenue_trend.csv && echo "✅ Trend data generated"
    
    - name: Success
      run: echo "All tests passed! ✅"
